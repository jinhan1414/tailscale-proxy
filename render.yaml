services:
  - type: web
    name: tailscale-proxy
    env: docker
    plan: free
    envVars:
      - key: TS_AUTHKEY
        sync: false
      - key: TS_HOSTNAME
        sync: false
      - key: TS_DNS
        value: "1.1.1.1"
      - key: TS_EXTRA_ARGS
        value: "--advertise-exit-node"
      - key: TS_KUBE_SECRET
        value: ""
      - key: TS_NETWORK_LOCK
        value: "false"
      - key: TS_STATE_DIR
        value: "/var/lib/tailscale"
      - key: TS_USERSPACE
        value: "true"
      - key: R2_STATE_ENABLED
        value: "true"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_OBJECT_KEY
        value: "tailscale/render-proxy/state.tar.gz"
      - key: R2_STATE_BACKUP_INTERVAL_SECONDS
        value: "300"
